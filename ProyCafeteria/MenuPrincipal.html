<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - Acceso</title>
    <style>
        :root {
            --verde-logo: #98d361;
            --gris-logo: #a6a6a6;
            --negro-texto: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--verde-logo) 0%, var(--gris-logo) 100%);
            background-attachment: fixed; /* Evita saltos en móviles al hacer scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Margen de seguridad para pantallas muy pequeñas */
            box-sizing: border-box;
        }

        .login-container {
            background-color: var(--blanco);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 380px; /* Tamaño ideal para escritorio y móvil */
            box-sizing: border-box;
        }

        .logo-img {
            max-width: 130px;
            width: 100%; /* Se adapta al contenedor */
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--negro-texto);
            margin: 0 0 10px 0;
            font-size: 1.8rem; /* Tamaño relativo */
            letter-spacing: 1px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .btn-acceso {
            display: block;
            text-decoration: none;
            padding: 18px; /* Más grande para facilitar el toque táctil */
            margin: 12px 0;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent; /* Quita el cuadro azul al tocar en móvil */
        }

        .cliente {
            background-color: var(--verde-logo);
            color: var(--blanco);
            border: 2px solid var(--verde-logo);
        }

        .empleado {
            background-color: transparent;
            color: var(--verde-logo);
            border: 2px solid var(--verde-logo);
        }

        /* Efectos de interacción */
        .btn-acceso:active {
            transform: scale(0.96); /* Efecto de presión al tocar */
        }

        @media (hover: hover) {
            .btn-acceso:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }
        }

        /* Ajustes específicos para móviles muy pequeños */
        @media (max-width: 360px) {
            .login-container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <img src="LOGO.jpg" alt="Logo Pío Baroja" class="logo-img">
        </div>

        <h1>CAFETERÍA</h1>
        <p>Bienvenido. Elige cómo quieres ingresar.</p>

        <a href="Menu2.html" class="btn-acceso cliente">Soy Cliente</a>
        <a href="PrototipoCafeteria.html" class="btn-acceso empleado">Soy Empleado</a>
        
    </div>
</body>
</html>
