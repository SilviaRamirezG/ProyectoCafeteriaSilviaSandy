<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - IES Pío Baroja</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root {
            --primary-green: #407e44;
            --light-green: #ebf5ec;
            --accent-green: #7eb34a;
            --text-dark: #333;
            --bg-gray: #f8f9fa;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal (Simulación Móvil) */
        .mobile-view {
            width: 100%;
            max-width: 430px;
            background: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }

        .status-icons {
            display: flex;
            gap: 5px;
        }

        .status-icons .material-symbols-outlined {
            font-size: 16px;
        }

        /* Header */
        header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 35px;
            height: auto;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text strong {
            font-size: 13px;
            color: #333;
        }

        .logo-text span {
            font-size: 9px;
            color: var(--primary-green);
            font-weight: bold;
        }

        .notif-icon {
            position: relative;
            color: #444;
        }

        .dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: #ff5252;
            border-radius: 50%;
            border: 1.5px solid var(--white);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 15px 20px;
            overflow-y: auto;
        }

        .welcome h1 {
            font-size: 26px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .welcome p {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        /* Card Reloj */
        .pick-up-card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            text-align: center;
            margin-bottom: 25px;
        }

        .pick-up-card h3 {
            font-size: 12px;
            margin-bottom: 15px;
            color: #888;
            text-transform: uppercase;
        }

        .time-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .time-cols {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .time-btn {
            padding: 8px 14px;
            border: none;
            background: #f1f3f5;
            border-radius: 10px;
            font-weight: 700;
            color: #777;
            font-size: 11px;
            cursor: pointer;
        }

        .time-btn.active {
            background-color: var(--primary-green);
            color: white;
        }

        /* Reloj Visual */
        .clock-display {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-circle {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .central-time {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: bold;
        }

        .num { position: absolute; font-size: 10px; color: #888; }
        .n12 { top: 5px; left: 50%; transform: translateX(-50%); }
        .n3 { right: 8px; top: 50%; transform: translateY(-50%); }
        .n9 { left: 8px; top: 50%; transform: translateY(-50%); }
        .n1 { top: 10px; right: 34px; }
        .n2 { top: 28px; right: 14px; }
        .n4 { bottom: 30px; right: 14px; }
        .n5 { bottom: 14px; right: 34px; }
        .n6 { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .n7 { bottom: 14px; left: 34px; }
        .n8 { bottom: 30px; left: 14px; }
        .n10 { top: 28px; left: 14px; }
        .n11 { top: 10px; left: 32px; }

        .clock-hand {
            position: absolute;
            width: 45%;
            height: 2px;
            background: var(--primary-green);
            top: 50%;
            left: 50%;
            transform-origin: left center;
            transform: rotate(-15deg);
        }

        .clock-hand::after {
            content: '';
            position: absolute;
            right: -4px;
            top: -4px;
            width: 10px;
            height: 10px;
            background: var(--primary-green);
            border-radius: 50%;
        }

        /* Productos */
        .order-section h3 {
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .products-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .product-img {
            height: 90px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 10px;
        }

        .jamon { background-image: url('https://as2.ftcdn.net/v2/jpg/01/96/83/13/1000_F_196831371_5gbGXWYTfvfsELzcxJtcA211Bqb6lWih.jpg'); }
        .eneryeti{ background-image: url('https://www.infohoreca.com/media/uploads/noticias/rrss/energety-hosteleria.jpg'); }

        .product-name {
            font-size: 11px;
            font-weight: 700;
            height: 30px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .qty-controls { display: flex; gap: 4px; }

        .qty-btn {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: none;
            background: var(--accent-green);
            color: white;
            cursor: pointer;
        }

        .qty-btn.minus { background: #e9ecef; color: #666; }

        .price { font-weight: 800; font-size: 13px; color: var(--primary-green); }

        /* Botón de Pago */
        .pay-button {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 15px;
            margin-bottom: 30px;
            cursor: pointer;
            text-decoration: none; /* Quita el subrayado azul */
            display: block;        /* Permite que ocupe el ancho y respete el padding */
            text-align: center;    /* Centra el texto */
        }

        .home-indicator {
            width: 120px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            margin: 0 auto 10px auto;
        }
.profile-container {
    position: relative;
    margin-left: auto; /* Empuja el perfil a la izquierda de la campana */
    margin-right: 15px; /* Espacio con la campana */
}

.profile-checkbox {
    display: none; /* Escondemos el checkbox */
}

.profile-icon {
    cursor: pointer;
    color: #444;
    display: flex;
    align-items: center;
}

.profile-icon span {
    font-size: 28px; /* Tamaño del icono de usuario */
}

/* Estado inicial del menú (oculto) */
.profile-dropdown {
    position: absolute;
    top: 40px;
    right: 0;
    width: 160px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    display: none; /* Oculto por defecto */
    z-index: 1000;
    overflow: hidden;
    border: 1px solid #eee;
}

/* Cuando el checkbox está marcado, mostramos el menú */
.profile-checkbox:checked ~ .profile-dropdown {
    display: block;
}

/* Estilos de los enlaces del menú */
.profile-dropdown a {
    display: block;
    padding: 12px 15px;
    text-decoration: none;
    color: var(--text-dark);
    font-size: 14px;
    transition: background 0.2s;
}

.profile-dropdown a:hover {
    background: var(--light-green);
    color: var(--primary-green);
}

.profile-dropdown hr {
    border: 0;
    border-top: 1px solid #eee;
    margin: 0;
}

.profile-dropdown .logout {
    color: #ff5252;
}

/* Capa transparente para cerrar el menú al hacer clic fuera (Opcional pero recomendado) */
.profile-checkbox:checked ~ .menu-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 999;
}
        /* --- VISTA TABLET (mínimo 768px) --- */
        @media (min-width: 768px) {
            .mobile-view {
                max-width: 900px;
                box-shadow: none;
            }
            .welcome h1 { font-size: 40px; }
            .welcome p { font-size: 22px; }
            .clock-display { width: 180px !important; height: 180px !important; }
            .central-time { font-size: 28px !important; }
            .num { font-size: 18px; }
            .product-img { height: 140px; }
            .product-name { font-size: 16px; }
            .pay-button { font-size: 22px; padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="mobile-view">
        <header>
            <div class="logo">
                <img src="ies_pio_baroja_logo.jpg" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <strong>IES PÍO BAROJA</strong>
                </div>
            </div>
            
            <div class="profile-container">
                <input type="checkbox" id="profile-toggle" class="profile-checkbox">
                
                <label for="profile-toggle" class="profile-icon">
                    <span class="material-symbols-outlined">account_circle</span>
                </label>

                <div class="profile-dropdown">
                    <a href="perfil.html">Mi Perfil</a>
                    <a href="pedidos.html">Mis Pedidos</a>
                    <a href="ajustes.html">Ajustes</a>
                    <hr>
                    <a href="index.html" class="logout">Cerrar Sesión</a>
                </div>
            </div>

            <div class="notif-icon">
                <span class="material-symbols-outlined">notifications</span>
                <div class="dot"></div>
            </div>
        </header>

        <main>
            <section class="welcome">
                <h1>¡Hola, Pablo!</h1>
                <p>Tu Recreo Sin Esperas.</p>
            </section>

            <section class="pick-up-card">
                <h3>ELIGE TU PICK-UP TIME</h3>
                <div class="time-selector">
                    <div class="time-cols">
                        <button class="time-btn">10:30</button>
                        <button class="time-btn">10:45</button>
                        <button class="time-btn">10:45</button>
                    </div>
                    
                    <div class="clock-display">
                        <div class="clock-circle">
                            <div class="clock-hand"></div>
                            <span class="num n12">12</span>
                            <span class="num n1">1</span>
                            <span class="num n2">2</span>
                            <span class="num n3">3</span>
                            <span class="num n4">4</span>
                            <span class="num n5">5</span>
                            <span class="num n6">6</span>
                            <span class="num n7">7</span>
                            <span class="num n8">8</span>
                            <span class="num n9">9</span>
                            <span class="num n10">10</span>
                            <span class="num n11">11</span>
                            <div class="central-time">11:15</div>
                        </div>
                    </div>

                    <div class="time-cols">
                        <button class="time-btn">11:00</button>
                        <button class="time-btn active">11:15</button>
                        <button class="time-btn">11:30</button>
                    </div>
                </div>
            </section>

            <section class="order-section">
                <h3>MI PEDIDO</h3>
                <div class="products-grid">
                    <div class="product-card">
                        <div class="product-img jamon"></div>
                        <p class="product-name">Bocadillo Jamón Ibérico</p>
                        <div class="product-footer">
                            <div class="qty-controls">
                                <button class="qty-btn">+</button>
                                <button class="qty-btn minus">-</button>
                            </div>
                            <span class="price">3.50€</span>
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-img eneryeti"></div>
                        <p class="product-name">Eneryeti</p>
                        <div class="product-footer">
                            <div class="qty-controls">
                                <button class="qty-btn">+</button>
                                <button class="qty-btn minus">-</button>
                            </div>
                            <span class="price">1.20€</span>
                        </div>
                    </div>
                </div>
            </section>

            <a href="Pago2.html" class="pay-button">
                CONFIRMAR Y PAGAR (7.50€)
            </a>
        </main>
        
        <div class="home-indicator"></div>
    </div>

</body>
</html>
