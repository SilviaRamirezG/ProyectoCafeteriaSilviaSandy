<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pedido - IES Pío Baroja</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        /* CSS UNIFICADO */
        :root {
            --primary-green: #407e44;
            --light-green: #ebf5ec;
            --accent-green: #7eb34a;
            --text-dark: #333;
            --bg-gray: #f8f9fa;
            --white: #ffffff;
            --rojo: #ff5252;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal (Simulación Móvil) */
        .mobile-view {
            width: 100%;
            max-width: 430px;
            background: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }

        .status-icons {
            display: flex;
            gap: 5px;
        }

        .status-icons .material-symbols-outlined {
            font-size: 18px;
        }

        /* Header */
        header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 35px;
            height: auto;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text strong {
            font-size: 13px;
            color: #333;
        }

        .logo-text span {
            font-size: 9px;
            color: var(--primary-green);
            font-weight: bold;
        }

        .notif-icon {
            position: relative;
            color: #444;
        }

        .dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: var(--rojo);
            border-radius: 50%;
            border: 1.5px solid var(--white);
        }

        /* Contenido Principal */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
        }

        /* Tarjeta de Confirmación */
        .confirmation-card {
            background-color: var(--white);
            border-radius: 35px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
        }

        .check-icon {
            font-size: 70px;
            color: var(--accent-green);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .status-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-green);
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* Sección QR */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .qr-placeholder img {
            width: 160px;
            height: 160px;
            padding: 10px;
            border: 1px solid #f0f0f0;
            border-radius: 15px;
        }

        .clave-container {
            text-align: center;
        }

        .clave-label {
            font-size: 18px;
            color: #888;
        }

        .clave-value {
            display: block;
            font-size: 30px;
            font-weight: 800;
            color: var(--text-dark);
        }

        /* Botón */
        .btn-primary {
            width: 100%;
            background-color: var(--primary-green);
            color: var(--white);
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-primary:active {
            background-color: var(--dark-green);
            transform: scale(0.98);
        }

        /* Indicador de inicio iPhone */
        .home-indicator {
            width: 130px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-container {
            position: relative;
            margin-left: auto; /* Empuja el perfil a la izquierda de la campana */
            margin-right: 15px; /* Espacio con la campana */
        }

        .profile-checkbox {
            display: none; /* Escondemos el checkbox */
        }

        .profile-icon {
            cursor: pointer;
            color: #444;
            display: flex;
            align-items: center;
        }

        .profile-icon span {
            font-size: 28px; /* Tamaño del icono de usuario */
        }

        /* Estado inicial del menú (oculto) */
        .profile-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            width: 160px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: none; /* Oculto por defecto */
            z-index: 1000;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* Cuando el checkbox está marcado, mostramos el menú */
        .profile-checkbox:checked ~ .profile-dropdown {
            display: block;
        }

        /* Estilos de los enlaces del menú */
        .profile-dropdown a {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 14px;
            transition: background 0.2s;
        }

        .profile-dropdown a:hover {
            background: var(--light-green);
            color: var(--primary-green);
        }

        .profile-dropdown hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 0;
        }

        .profile-dropdown .logout {
            color: #ff5252;
        }

        /* Capa transparente para cerrar el menú al hacer clic fuera (Opcional pero recomendado) */
        .profile-checkbox:checked ~ .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }
        /* --- VISTA TABLET (mínimo 768px) --- */
        @media (min-width: 768px) {
            .mobile-view {
                max-width: 900px;
                background: none;
                box-shadow: none;
            }

            .status-bar {
                font-size: 18px;
                padding: 20px 30px 10px 30px;
            }

            header { padding: 20px 30px; }
            .logo-img { width: 55px; }
            .logo-text strong { font-size: 20px; }
            .logo-text span { font-size: 13px; }

            .confirmation-card {
                padding: 60px 40px;
                border-radius: 45px;
                background: white;
                box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            }

            .check-icon { font-size: 100px; }
            .status-text { font-size: 45px; }

            .qr-placeholder img {
                width: 220px;
                height: 220px;
            }

            .clave-label { font-size: 22px; }
            .clave-value { font-size: 40px; }

            .btn-primary {
                font-size: 22px;
                padding: 25px;
                border-radius: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-view">
        <header>
            <div class="logo">
                <img src="ies_pio_baroja_logo.jpg" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <strong>IES PÍO BAROJA</strong>
                </div>
            </div>
            
            <div class="profile-container">
                <input type="checkbox" id="profile-toggle" class="profile-checkbox">
                
                <label for="profile-toggle" class="profile-icon">
                    <span class="material-symbols-outlined">account_circle</span>
                </label>

                <div class="profile-dropdown">
                    <a href="perfil.html">Mi Perfil</a>
                    <a href="pedidos.html">Mis Pedidos</a>
                    <a href="ajustes.html">Ajustes</a>
                    <hr>
                    <a href="index.html" class="logout">Cerrar Sesión</a>
                </div>
            </div>

            <div class="notif-icon">
                <span class="material-symbols-outlined">notifications</span>
                <div class="dot"></div>
            </div>
        </header>

        <div class="content">
            <div class="confirmation-card">
                <div class="status-container">
                    <div class="check-icon">✓</div>
                    <h2 class="status-text">PAGADO</h2>
                </div>

                <div class="qr-section">
                    <div class="qr-placeholder">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PB7X9" alt="Código QR">
                    </div>
                    <div class="clave-container">
                        <span class="clave-label">Clave:</span>
                        <span class="clave-value">PB7X9</span>
                    </div>
                </div>

                <button class="btn-primary">MOSTRAR EN MOSTRADOR</button>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>
</body>
</html>
