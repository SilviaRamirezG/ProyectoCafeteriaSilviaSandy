<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IES Pío Baroja - Pago</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #3d7a44;
            --light-green: #ebf5ec;
            --dark-green: #2a5a3a;
            --accent-green: #7eb34a;
            --text-dark: #333;
            --bg-light: #f4f7f5;
            --text-black: #1a1a1a;
            --text-gray: #7a7a7a;
            --bg-gray: #f8f9fa;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal (Simulación móvil) */
        .mobile-view {
            width: 100%;
            max-width: 430px;
            background: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }

        .status-icons {
            display: flex;
            gap: 5px;
        }

        .status-icons .material-symbols-outlined {
            font-size: 16px;
        }

        /* Header */
        header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 35px;
            height: auto;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text strong {
            font-size: 13px;
            color: #333;
        }

        .logo-text span {
            font-size: 9px;
            color: var(--primary-green);
            font-weight: bold;
        }

        .notif-icon {
            position: relative;
            color: #444;
        }

        .dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: #ff5252;
            border-radius: 50%;
            border: 1.5px solid var(--white);
        }

        /* Contenido de Pago */
        .content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .payment-card {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .card-inner-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }

        .card-inner-header h3 {
            font-size: 12px;
            letter-spacing: 0.8px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .change-action {
            font-size: 12px;
            color: var(--primary-green);
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Tarjeta Visual (Gradiente) */
        .credit-card-visual {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            border-radius: 20px;
            padding: 25px;
            color: white;
            position: relative;
            height: 170px;
            box-shadow: 0 10px 20px rgba(61, 122, 68, 0.2);
        }

        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #f0d78c 0%, #d4af37 100%);
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .number {
            font-size: 20px;
            letter-spacing: 2.5px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .holder {
            font-size: 13px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .visa-icon {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 35px;
        }

        /* Resumen de Pago */
        .summary-container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text-gray);
        }

        .summary-divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 15px 0;
        }

        .total {
            color: var(--text-black);
            font-weight: 800;
            font-size: 20px;
        }

        /* Seguridad y Botón */
        .secure-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 35px;
            color: #aaa;
            font-size: 12px;
        }

        .confirm-pay-btn {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 17px;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .confirm-pay-btn:active {
            transform: scale(0.98);
        }

        .home-indicator {
            width: 130px;
            height: 5px;
            background: #000;
            border-radius: 10px;
            margin: 15px auto 10px auto;
        }
        .profile-container {
            position: relative;
            margin-left: auto; /* Empuja el perfil a la izquierda de la campana */
            margin-right: 15px; /* Espacio con la campana */
        }

        .profile-checkbox {
            display: none; /* Escondemos el checkbox */
        }

        .profile-icon {
            cursor: pointer;
            color: #444;
            display: flex;
            align-items: center;
        }

        .profile-icon span {
            font-size: 28px; /* Tamaño del icono de usuario */
        }

        /* Estado inicial del menú (oculto) */
        .profile-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            width: 160px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: none; /* Oculto por defecto */
            z-index: 1000;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* Cuando el checkbox está marcado, mostramos el menú */
        .profile-checkbox:checked ~ .profile-dropdown {
            display: block;
        }

        /* Estilos de los enlaces del menú */
        .profile-dropdown a {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 14px;
            transition: background 0.2s;
        }

        .profile-dropdown a:hover {
            background: var(--light-green);
            color: var(--primary-green);
        }

        .profile-dropdown hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 0;
        }

        .profile-dropdown .logout {
            color: #ff5252;
        }

        /* Capa transparente para cerrar el menú al hacer clic fuera (Opcional pero recomendado) */
        .profile-checkbox:checked ~ .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }
        /* --- VISTA TABLET (mínimo 768px) --- */
        @media (min-width: 768px) {
            .mobile-view {
                max-width: 900px;
                box-shadow: none;
                background: none;
            }

            header { padding: 25px 35px; }
            .logo-img { width: 60px; }
            .logo-text strong { font-size: 22px; }
            .logo-text span { font-size: 14px; }

            .content { padding: 40px; }

            .payment-card, .summary-container {
                padding: 35px;
                border-radius: 40px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                background: white;
            }

            .credit-card-visual {
                height: 230px;
                padding: 35px;
            }

            .number { font-size: 28px; }
            .holder { font-size: 18px; }
            .visa-icon { font-size: 50px; }

            .summary-row { font-size: 20px; }
            .total { font-size: 28px; }

            .confirm-pay-btn {
                font-size: 24px;
                padding: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-view">
        <header>
            <div class="logo">
                <img src="ies_pio_baroja_logo.jpg" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <strong>IES PÍO BAROJA</strong>
                </div>
            </div>
            
            <div class="profile-container">
                <input type="checkbox" id="profile-toggle" class="profile-checkbox">
                
                <label for="profile-toggle" class="profile-icon">
                    <span class="material-symbols-outlined">account_circle</span>
                </label>

                <div class="profile-dropdown">
                    <a href="perfil.html">Mi Perfil</a>
                    <a href="pedidos.html">Mis Pedidos</a>
                    <a href="ajustes.html">Ajustes</a>
                    <hr>
                    <a href="index.html" class="logout">Cerrar Sesión</a>
                </div>
            </div>

            <div class="notif-icon">
                <span class="material-symbols-outlined">notifications</span>
                <div class="dot"></div>
            </div>
        </header>

        <main class="content">
            <div class="payment-card">
                <div class="card-inner-header">
                    <h3>MÉTODO DE PAGO</h3>
                    <span class="change-action">Cambiar</span>
                </div>
                
                <div class="credit-card-visual">
                    <div class="chip"></div>
                    <div class="card-data">
                        <p class="number">**** **** **** 4592</p>
                        <p class="holder">PABLO MARTÍNEZ</p>
                    </div>
                    <i class="fab fa-cc-visa visa-icon"></i>
                </div>
            </div>

            <div class="summary-container">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>7.50€</span>
                </div>
                <div class="summary-row">
                    <span>Gastos de gestión</span>
                    <span>0.00€</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row total">
                    <span>Total a pagar</span>
                    <span>7.50€</span>
                </div>
            </div>

            <div class="secure-badge">
                <i class="fas fa-lock"></i>
                <span>Pago 100% seguro con encriptación SSL</span>
            </div>

            <a href="QR2.html" class="confirm-pay-btn">
                PAGAR AHORA <i class="fas fa-arrow-right"></i>
            </a>
        </main>

        <div class="home-indicator"></div>
    </div>

</body>
</html>
